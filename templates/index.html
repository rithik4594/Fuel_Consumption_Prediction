<!DOCTYPE html>
<html>
<head>
    <title>Fuel Consumption Predictor</title>

    <style>

        body{
            font-family: Arial;
            background:#0f172a;
            color:white;
            text-align:center;
            padding-top:50px;
        }

        .container{
            width:400px;
            margin:auto;
            background:#1e293b;
            padding:30px;
            border-radius:15px;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
            border:none;
            border-radius:5px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
        }

        h1{
            color:#60a5fa;
        }

    </style>

</head>
<body>

<div class="container">

<h1>🚗 Fuel Consumption Predictor</h1>

<form action="/predict" method="post">

<input type="number" step="any" name="cylinders" placeholder="Cylinders" required>

<input type="number" step="any" name="displacement" placeholder="Displacement" required>

<input type="number" step="any" name="horsepower" placeholder="Horsepower" required>

<input type="number" step="any" name="weight" placeholder="Weight" required>

<input type="number" step="any" name="acceleration" placeholder="Acceleration" required>

<button type="submit">Predict MPG</button>

</form>

<h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
